<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itens</title>
    <link rel="icon" type="image/icon" href="static/logosenai.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="static/styles.css">
  </head>
<body>

  <img id="fundologin1" src="static/fundologin1.jpeg" alt="Senai">
    <div id="caixa-tabela">
        <table id="table">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Nome</th>
            <th scope="col">Categoria</th>
            <th scope="col">Estoque</th>
            <th scope="col">Preço</th>
            <th scope="col">Imagem</th>
          </tr>
        </thead>
        <tbody>
          
          {% for item in resultado %}

          <tr>
            <th scope="row">{{item[0]}}</th>
            <td>{{item[1]}}</td>
            <td>{{item[2]}}</td>
            <td>{{item[3]}}</td>
            <td>{{item[4]}}</td>
            <td><button onclick="mostrar_foto('{{item[5]}}')">Foto</button></td>
          </tr>

          {%endfor%}

          <script>
            function mostrar_foto(arg){
              Swal.fire({
              imageUrl: arg
            });
          }
          </script>

      <a id="botaovoltar" href="{{ url_for('painel') }}" class="btn btn-primary">
      &larr; Voltar para a tela de Inicio
      </a>

    </body>
</html>
