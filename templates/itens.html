<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itens</title>
    <link rel="icon" type="image/icon" href="static/logosenai.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="static/styles.css">
  </head>
<body>

  <img id="fundologin1" src="static/fundologin1.jpeg" alt="Senai">
    <nav class="navbar navbar-expand-lg bg-body-tertiary" style="padding: 0px;">
    <div id="navbar" class="container-fluid">
    <a class="navbar-brand" href="#">
    <img src="static/logo2.jpeg" alt="Logo" style="height: 30px; width: auto; margin-right: 10px; vertical-align: middle;">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
        <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/Itens">
        <img src="static/galpao2.png" alt="Ícone Itens" style="height: 20px; width: 20px; margin-right: 5px; vertical-align: middle;">Itens</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
          Cadastrar
        </a>
          <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="/adicionar">Adicionar Novo Item</a></li>
          <li><a class="dropdown-item" href="/retirar">Movimentar</a></li>
          </ul>
        <li class="nav-usuarios">
          <a class="nav-link active" aria-current="page" href="/usuarios" vertical-align: middle;>Cadastrar Usuarios</a>
        </li>
        </li>
        </ul>
      </div>
  </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <div id="caixa-tabela">
        <table id="table">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Nome</th>
            <th scope="col">Categoria</th>
            <th scope="col">Estoque</th>
            <th scope="col">Preço</th>
            <th scope="col">Imagem</th>
          </tr>
        </thead>
        <tbody>
          
          {% for item in resultado %}

          <tr>
            <th scope="row">{{item[0]}}</th>
            <td>{{item[1]}}</td>
            <td>{{item[2]}}</td>
            <td>{{item[3]}}</td>
            <td>{{item[4]}}</td>
            <td><button onclick="mostrar_foto('{{item[5]}}')">Foto</button></td>
          </tr>

          {%endfor%}

          <script>
            function mostrar_foto(arg){
              Swal.fire({
              imageUrl: arg
            });
          }
          </script>

      <a id="botao_inicio" href="{{ url_for('painel') }}" class="btn btn-primary">
      &larr; Voltar para a tela de Inicio
      </a>

    </body>
</html>
