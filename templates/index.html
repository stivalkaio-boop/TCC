<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Login</title>
    <link rel="icon" type="image/icon" href="static/logosenai.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="static/styles.css">
</head>

<body id="fundo">

    <!--imagem do fundo-->
    <img id="fundologin" src="static/NEYMAR1.jpeg" alt="Neymar SENAI">

    <!--logo-->
    <img id="logo" src="static/logo1.jpeg" alt="Logo">

    <!--formulario-->
    <form class="formulario-login" action="/" method="POST">

    <div class="campo">
        <input id="usuario" name="username" type="text" placeholder="Digite seu nome" required>
    </div>

    <div class="campo">
        <input id="senha" name="password" type="password" placeholder="Digite sua senha" required>
    </div>

    <button id="botaodelogin" type="submit" class="btn">
        Entrar
    </button>

</body>
</html>
