<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirar</title>
</head>
<body>
    <body id="fundoretirar">
    <button id="retirar" type="button" class="btn btn-primary"> Retirar item </button>
    
<div class="quadro_retirar" id="quadro">
    <div class="quadro-retirar">
        <h3>Retire seu Item!</h3>            
        
        <form action="/salvar" method="POST" enctype="multipart/form-data">
            <label for="nome">Nome do item:</label>
            <input type="text" name="nome" placeholder="Nome do item">
            <label for="nome">Função:</label>
            <input type="text" name="funcao" placeholder="Função do item">
            <label for="nome">Quantidade:</label>
            <input type="number" name="quantidade" placeholder="Quantidade">
            <label for="nome">Preço do item:</label>
            <input type="text" name="preco" placeholder="Preço">
             <label for="imagem">Imagem do seu Item:</label>
            <input type="file" id="imagem" name="imagem" accept="image/*">

    </form>
    <script>
        function mostrarQuadro() {
            document.getElementById('QUADRO').style.display = 'flex';
        }
        function esconderQuadro() {
            document.getElementById('QUADRO').style.display = 'none';
        }
    </script>
</body>
</html>
